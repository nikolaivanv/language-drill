<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Read — design handoff prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="read.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    /* Minimal harness wrapper — replaces the real app's left-nav AppShell. */
    .harness-banner {
      background: var(--paper-2); border-bottom: 1px solid var(--rule);
      padding: 10px 22px; font: 12px var(--t-mono); color: var(--ink-soft);
      display: flex; gap: 14px; align-items: center;
    }
    .harness-banner b { color: var(--accent); font-weight: 600; }
    .harness-main { background: var(--paper); min-height: calc(100vh - 38px); }
  </style>
</head>
<body>
  <div class="harness-banner">
    <b>handoff prototype</b>
    <span>Read feature in isolation · scaffolding (demo states / legend / language picker / layout toggle) is prototype-only — see README.md</span>
  </div>
  <div id="root"></div>

  <script type="text/babel">
    // Stub AppShell — the real app's chrome already exists in production.
    function AppShell({ children }) {
      return <div className="harness-main">{children}</div>;
    }
    window.AppShell = AppShell;
  </script>

  <script type="text/babel" src="read-data.jsx"></script>
  <script type="text/babel" src="read-cards.jsx"></script>
  <script type="text/babel" src="read-passage.jsx"></script>
  <script type="text/babel" src="read.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ReadHiFi onNav={() => {}} />
    );
  </script>
</body>
</html>
