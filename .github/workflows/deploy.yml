name: Production Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  prod-migrate:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations against production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @language-drill/db db:migrate

  cdk-deploy-prod:
    name: CDK Deploy (prod)
    runs-on: ubuntu-latest
    needs: [prod-migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy CDK stack
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLERK_ISSUER_URL: ${{ secrets.CLERK_ISSUER_URL }}
          CLERK_AUDIENCE: ${{ secrets.CLERK_AUDIENCE }}
          API_DOMAIN_NAME: ${{ secrets.API_DOMAIN_NAME }}
          CLERK_ISSUER_URL_DEV: ${{ secrets.CLERK_ISSUER_URL_DEV }}
          CLERK_AUDIENCE_DEV: ${{ secrets.CLERK_AUDIENCE_DEV }}
          API_DOMAIN_NAME_DEV: ${{ secrets.API_DOMAIN_NAME_DEV }}
          ADMIN_USER_IDS: ${{ secrets.ADMIN_USER_IDS }}
          ADMIN_USER_IDS_DEV: ${{ secrets.ADMIN_USER_IDS_DEV }}
        run: cd infra && pnpm cdk deploy LanguageDrillStack --exclusively --require-approval never

  vercel-prod:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    needs: [cdk-deploy-prod]
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Read AnnotateStreamUrl from prod CFN outputs
        id: prod_stream_url
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name LanguageDrillStack \
            --query "Stacks[0].Outputs[?OutputKey=='AnnotateStreamUrl'].OutputValue" \
            --output text)
          if [ -z "$URL" ] || [ "$URL" = "None" ]; then
            echo "::error::AnnotateStreamUrl output not found on LanguageDrillStack"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Sync NEXT_PUBLIC_ANNOTATE_STREAM_URL to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel env rm NEXT_PUBLIC_ANNOTATE_STREAM_URL production --yes --token "$VERCEL_TOKEN" || true
          echo "${{ steps.prod_stream_url.outputs.url }}" | vercel env add NEXT_PUBLIC_ANNOTATE_STREAM_URL production --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token "$VERCEL_TOKEN" --yes

  dev-migrate:
    name: Run Dev Migrations
    runs-on: ubuntu-latest
    needs: [cdk-deploy-prod]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations against dev
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: pnpm --filter @language-drill/db db:migrate

  cdk-deploy-dev:
    name: CDK Deploy (dev)
    runs-on: ubuntu-latest
    needs: [dev-migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy CDK dev stack
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLERK_ISSUER_URL: ${{ secrets.CLERK_ISSUER_URL }}
          CLERK_AUDIENCE: ${{ secrets.CLERK_AUDIENCE }}
          API_DOMAIN_NAME: ${{ secrets.API_DOMAIN_NAME }}
          CLERK_ISSUER_URL_DEV: ${{ secrets.CLERK_ISSUER_URL_DEV }}
          CLERK_AUDIENCE_DEV: ${{ secrets.CLERK_AUDIENCE_DEV }}
          API_DOMAIN_NAME_DEV: ${{ secrets.API_DOMAIN_NAME_DEV }}
          ADMIN_USER_IDS: ${{ secrets.ADMIN_USER_IDS }}
          ADMIN_USER_IDS_DEV: ${{ secrets.ADMIN_USER_IDS_DEV }}
        run: cd infra && pnpm cdk deploy LanguageDrillStack-dev --exclusively --require-approval never

  vercel-env-dev:
    name: Sync Stream URL to Vercel (preview)
    runs-on: ubuntu-latest
    needs: [cdk-deploy-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Read AnnotateStreamUrl from dev CFN outputs
        id: dev_stream_url
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name LanguageDrillStack-dev \
            --query "Stacks[0].Outputs[?OutputKey=='AnnotateStreamUrl'].OutputValue" \
            --output text)
          if [ -z "$URL" ] || [ "$URL" = "None" ]; then
            echo "::error::AnnotateStreamUrl output not found on LanguageDrillStack-dev"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Sync NEXT_PUBLIC_ANNOTATE_STREAM_URL to Vercel preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel env rm NEXT_PUBLIC_ANNOTATE_STREAM_URL preview --yes --token "$VERCEL_TOKEN" || true
          echo "${{ steps.dev_stream_url.outputs.url }}" | vercel env add NEXT_PUBLIC_ANNOTATE_STREAM_URL preview --token "$VERCEL_TOKEN"
