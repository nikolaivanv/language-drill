name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Detect whether the PR touches anything other than docs/markdown. The heavy
  # jobs (Neon branch, Vercel preview, Playwright E2E) gate on `code == 'true'`.
  # We gate at the JOB level (not via the workflow `paths` filter) on purpose:
  # a path-skipped *workflow* never reports its checks, so a required check would
  # hang the PR forever — whereas a job skipped by an `if:` condition reports as
  # "skipped", which branch protection treats as a passing required check.
  # `lint-typecheck` and `test` stay un-gated: they're near-instant on a docs PR
  # (`turbo --affected` finds nothing) and keep reporting green unconditionally.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      # dorny/paths-filter reads the PR's changed-file list from the API against
      # the PR base automatically — no checkout/fetch-depth needed.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # A changed file counts as `code` if it matches `**` AND neither
          # exclusion — i.e. any file that is NOT *.md and NOT docs/**.
          # `predicate-quantifier: every` is REQUIRED for that AND: dorny's
          # default combines a filter's patterns with `.some()` (OR) and has no
          # gitignore-style negation, so with the default the bare `**` matches
          # every file and `code` is always 'true' — the `!` exclusions never
          # subtract, and the heavy-job gate below never skips. `every` forces
          # all three patterns to hold, so `!**/*.md` / `!docs/**` truly exclude.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    # Turbo remote cache (Vercel) — shared with the other PR jobs and the
    # deploy.yml `verify` gate, so tasks run once and replay everywhere.
    env:
      TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      # Full history so turbo `--affected` can diff against the PR base commit.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      # Persist turbo's task cache across runs. PRs fall back via restore-keys
      # to the default-branch cache seeded by deploy.yml's `verify` job, so
      # unchanged packages replay instead of re-running.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-lint-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-
      - run: pnpm install --frozen-lockfile
      # Only lint/typecheck packages changed since the PR base (+ dependents).
      - run: pnpm turbo lint typecheck --affected
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ github.sha }}
          restore-keys: |
            turbo-
      - run: pnpm install --frozen-lockfile
      # Only test packages affected since the PR base (+ their dependents). The
      # full suite is the gate on the merge commit (deploy.yml `verify` job).
      - run: pnpm turbo test --affected
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}

  neon-migrate:
    name: Neon Branch & Migrate
    runs-on: ubuntu-latest
    needs: [changes, lint-typecheck, test]
    # Skip for docs-only PRs — no schema change to migrate against.
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install neonctl
        run: npm install -g neonctl

      - name: Create or reuse Neon branch
        id: neon-create
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          BRANCH_NAME="pr-${{ github.event.number }}"
          PROJECT_ID="${{ secrets.NEON_PROJECT_ID }}"

          # Delete existing branch if present (re-run scenario)
          neonctl branches delete "$BRANCH_NAME" \
            --project-id "$PROJECT_ID" --yes 2>/dev/null || true

          BRANCH_OUTPUT=$(neonctl branches create \
            --project-id "$PROJECT_ID" \
            --name "$BRANCH_NAME" \
            --parent dev \
            --output json)

          DATABASE_URL=$(echo "$BRANCH_OUTPUT" | jq -r '.connection_uris[0].connection_uri')
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Run Drizzle migrations
        run: pnpm --filter @language-drill/db db:migrate

  preview:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    needs: [changes, neon-migrate]
    # Skip for docs-only PRs — nothing in the deployable app changed.
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel Preview
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --token "$VERCEL_TOKEN" --yes)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Post preview URL as PR comment
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔗 **Preview deploy:** ${{ steps.vercel-deploy.outputs.url }}`
            })

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Self-contained — the web specs mock every API call, so this only needs the
    # dev Clerk instance + a migrated DB for `createTestUser`. The canonical
    # `+clerk_test` user is upserted idempotently (onConflictDoNothing), so
    # pointing at the shared dev Neon branch is safe even across parallel PRs.
    needs: [changes, lint-typecheck, test]
    # Skip for docs-only PRs — the browser install + production web build that
    # dominate this job's wall-clock have nothing to exercise.
    if: needs.changes.outputs.code == 'true'
    env:
      # Turbo remote cache (Vercel) — shared with the other jobs so the
      # `turbo build` of the workspace packages replays instead of rebuilding.
      TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      # Dev Neon branch connection string — a DEDICATED secret, NOT the prod
      # `DATABASE_URL`. E2E only writes the idempotent test user + a default
      # language profile here.
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      # Dev Clerk instance (pk_test_/sk_test_). The suite hard-refuses pk_live_.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
      E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
      E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
      # The web tests mock every API call via page.route, so the API never
      # actually has to be up — this just needs to be a valid URL for the
      # locally-served frontend. (No E2E_FULL_STACK ⇒ the drill/theory smoke
      # tests, which need a real seeded backend, skip.)
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_ANNOTATE_STREAM_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # `auth.setup` imports `@language-drill/db` (createDb) as a built package,
      # and the dev server resolves the other workspace packages' `dist`. A bare
      # `pnpm install` doesn't run their `tsc` build, so compile them first.
      - name: Build workspace packages
        run: pnpm turbo build --filter='./packages/*'

      # The E2E database is the long-lived shared dev branch (E2E_DATABASE_URL),
      # NOT the per-PR ephemeral branch that `neon-migrate` migrates — so it must
      # be brought up to the current schema here before `auth.setup` upserts the
      # test user, or a newly-added column (e.g. `users.plan`) makes the insert
      # fail. Migrations are forward-only and idempotent (Drizzle's journal skips
      # already-applied ones), so running this every PR is safe.
      - name: Migrate the E2E database
        run: pnpm --filter @language-drill/db db:migrate

      - name: Install Playwright Chromium + system deps
        run: pnpm --filter @language-drill/web exec playwright install --with-deps chromium

      # Production build so the suite runs against `next start` (no React
      # StrictMode), matching what ships on Vercel. NEXT_PUBLIC_* are baked in
      # here from the job env.
      - name: Build web app
        run: pnpm --filter @language-drill/web build

      # No PLAYWRIGHT_BASE_URL ⇒ playwright.config starts the server itself
      # (`next start` in CI) and runs against http://localhost:3000.
      - name: Run E2E suite
        run: pnpm --filter @language-drill/web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
